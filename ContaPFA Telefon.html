<style>
:root{--navy:#1A3A5C;--red:#C0392B;--gold:#B08D57;--cream:#F5F0E8;--ink:#1a2530;--grey:#7a8694;--line:#e8e0d4;--green:#1a7a4a;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-text-size-adjust:100%;}
.disp{font-family:'Fraunces',Georgia,serif;} .tnum{font-variant-numeric:tabular-nums;}
button,input,select{font-family:inherit;-webkit-appearance:none;border:none;background:none;} button{cursor:pointer;}
#app{display:flex;flex-direction:column;height:100%;}
#sbar{background:var(--navy);height:var(--safe-top);flex:0 0 auto;}
#hdr{background:var(--navy);flex:0 0 auto;height:56px;padding:0 16px;display:flex;align-items:center;gap:10px;}
.hlogo{width:32px;height:32px;border-radius:9px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex:0 0 auto;}
.htx{flex:1;min-width:0;} .htx .t{color:#fff;font-size:17px;font-weight:700;font-family:'Fraunces',serif;} .htx .s{color:#8fb3cc;font-size:10px;margin-top:1px;}
.hexp{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.13);color:#fff;font-size:11px;font-weight:600;}
#view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px 16px;}
#bnav{background:#fff;border-top:1px solid var(--line);flex:0 0 auto;display:flex;padding-bottom:var(--safe-bot);}
.bnt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 2px;color:var(--grey);min-height:60px;}
.bnt.on{color:var(--navy);} .bnt svg{width:22px;height:22px;} .bnt span{font-size:10px;font-weight:600;margin-top:1px;}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;}
.stat{padding:14px 15px;}
.lb{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--grey);font-weight:600;}
.vl{font-family:'Fraunces',serif;font-weight:700;margin-top:4px;line-height:1.1;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;} .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;} .g2in{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;} .row+.row{border-top:1px solid var(--line);}
.itag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:5px;background:var(--cream);color:var(--grey);font-weight:600;margin-bottom:4px;}
.ittl{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.imta{display:flex;gap:8px;margin-top:4px;font-size:12px;flex-wrap:wrap;}
.item{display:flex;gap:10px;padding:12px 13px;background:#fff;border:1px solid var(--line);border-radius:14px;} .item+.item{margin-top:8px;}
.itxt{flex:1;min-width:0;cursor:pointer;} .idel{padding:10px;border-radius:10px;color:var(--grey);align-self:center;flex:0 0 auto;}
.sechead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.sectit{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--navy);} .secsub{font-size:12px;color:var(--grey);margin-top:2px;}
.addbtn{display:flex;align-items:center;gap:5px;padding:9px 13px;border-radius:10px;background:var(--navy);color:#fff;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(26,58,92,.22);flex:0 0 auto;}
.alert{padding:12px 14px;border-radius:13px;display:flex;gap:8px;align-items:flex-start;font-size:13px;font-weight:500;}
.ok{background:#eaf5ef;border:1px solid #b8dfc8;} .ww{background:#fdf2e7;border:1px solid #efd5a8;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap;}
th{background:var(--cream);text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--grey);padding:8px 11px;font-weight:700;}
td{padding:8px 11px;border-top:1px solid var(--line);} th.r,td.r{text-align:right;} tfoot td{background:var(--cream);border-top:2px solid var(--line);font-weight:700;}
.movl{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);display:flex;flex-direction:column;justify-content:flex-end;}
.msheet{background:#fff;border-radius:22px 22px 0 0;max-height:92vh;display:flex;flex-direction:column;}
.mhead{background:var(--navy);border-radius:22px 22px 0 0;padding:0 18px;height:56px;display:flex;align-items:center;gap:10px;flex:0 0 auto;}
.mhead .mt{font-family:'Fraunces',serif;color:#fff;font-size:17px;font-weight:700;flex:1;}
.mbody{overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;padding-bottom:calc(20px + var(--safe-bot));}
label.fld .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--grey);display:block;margin-bottom:4px;font-weight:600;}
.inp{width:100%;padding:12px 13px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);outline:none;font-size:16px;}
.inp:focus{border-color:var(--navy);}
.seg{display:flex;gap:8px;} .seg button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;font-size:14px;}
.seg button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.sv{width:100%;padding:15px;border-radius:13px;background:var(--red);color:#fff;font-weight:700;font-size:16px;}
.scl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.sold-card{background:var(--navy);border-radius:18px;padding:20px 18px;margin-bottom:12px;}
.sold-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8fb3cc;font-weight:600;}
.sold-val{font-family:'Fraunces',serif;font-size:36px;font-weight:700;color:#fff;line-height:1.1;margin-top:6px;}
.sold-detail{margin-top:14px;display:flex;flex-direction:column;gap:5px;}
.sdr{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.65);}
.sdr b{color:#fff;} .sdr-div{height:1px;background:rgba(255,255,255,.15);margin:5px 0;}
.sp{margin-top:10px;} .note{font-size:11px;color:var(--grey);line-height:1.6;margin-top:10px;}
.itip{font-size:12px;color:var(--grey);background:var(--cream);border-radius:10px;padding:11px 13px;margin-top:10px;line-height:1.6;}
.menuitem{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 14px;margin-bottom:10px;cursor:pointer;}
.mico{width:44px;height:44px;border-radius:12px;font-size:22px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.minfo{flex:1;} .minfo .mt2{font-size:15px;font-weight:700;} .minfo .ms{font-size:12px;color:var(--grey);margin-top:2px;}
</style>
</head>

    <button class="hexp" onclick="exportCSV()">⤓ Export</button>
  </div>

</div>
<div id="modal"></div>
<script>
const SEED_REG=[
 {id:1,data:"2026-02-20",doc:"FF/TS331230",fel:"Achiziție certificat digital",in_num:0,in_banca:0,pl_num:0,pl_banca:184.97},
 {id:2,data:"2026-02-20",doc:"Declarație/Proces verbal 1",fel:"Transfer din patrimoniu propriu",in_num:0,in_banca:0,pl_num:1200,pl_banca:0},
 {id:3,data:"2026-02-23",doc:"FF/ROY15514",fel:"Achiziție cărți de vizită",in_num:0,in_banca:0,pl_num:0,pl_banca:240},
 {id:4,data:"2026-02-24",doc:"BF/0130",fel:"Imprimare diplome cursanți",in_num:0,in_banca:0,pl_num:0,pl_banca:22.8},
 {id:5,data:"2026-02-26",doc:"FF/ROWHP 2102279370",fel:"Achiziție memorie laptop",in_num:0,in_banca:0,pl_num:0,pl_banca:285.99},
 {id:6,data:"2026-02-27",doc:"FF/ISIS26494",fel:"Achiziție RUC",in_num:0,in_banca:0,pl_num:0,pl_banca:30.25},
 {id:7,data:"2026-02-27",doc:"FF/ISIS26496",fel:"Achiziție REF",in_num:0,in_banca:0,pl_num:0,pl_banca:78.65},
 {id:8,data:"2026-03-03",doc:"FF/OBM 56380",fel:"Achiziție licență Oblio",in_num:0,in_banca:0,pl_num:0,pl_banca:178.89},
 {id:9,data:"2026-03-04",doc:"FF/TD001",fel:"Încasare factură Iașisting",in_num:0,in_banca:2500,pl_num:0,pl_banca:0},
 {id:10,data:"2026-03-04",doc:"FF/AAAA8161",fel:"Achiziție baterie laptop",in_num:0,in_banca:0,pl_num:0,pl_banca:203.5},
 {id:11,data:"2026-03-13",doc:"Extras",fel:"Comision eliberare card business",in_num:0,in_banca:0,pl_num:0,pl_banca:15},
 {id:12,data:"2026-03-03",doc:"BF/026",fel:"Achiziție baterii",in_num:0,in_banca:0,pl_num:0,pl_banca:27.9},
 {id:13,data:"2026-03-03",doc:"FF/RO38009900099796",fel:"Achiziție șervețele igienice",in_num:0,in_banca:0,pl_num:0,pl_banca:18.14},
 {id:14,data:"2026-05-04",doc:"FF/TD002",fel:"Încasare factură Mensave",in_num:0,in_banca:501.03,pl_num:0,pl_banca:0},
 {id:15,data:"2026-05-13",doc:"FF/29V9DXQH-001",fel:"Achiziție program AI",in_num:0,in_banca:0,pl_num:0,pl_banca:116.21},
 {id:16,data:"2026-05-17",doc:"BF/061",fel:"Tipărire diplome și certificate",in_num:0,in_banca:0,pl_num:0,pl_banca:42.3},
 {id:17,data:"2026-05-29",doc:"FF/TD003",fel:"Încasare factură Daroconstruct",in_num:0,in_banca:3000,pl_num:0,pl_banca:0},
 {id:18,data:"2026-06-04",doc:"FF/30",fel:"Achiziție materiale sanitare",in_num:0,in_banca:0,pl_num:0,pl_banca:47.2},
];
const SEED_AUTO=[
 {id:1,data:"2026-05-20",furnizor:"OMV Petrom",tip:"Bancă",desc:"Alimentare carburant",suma:320.15,proc:"",doc:""},
 {id:2,data:"2026-05-23",furnizor:"AUTOVIC",tip:"Bancă",desc:"Reparare auto",suma:2375,proc:"",doc:""},
];
const SEED_SET={salariuMinim:4050,pensionar:1,impozitPct:0.10,cassPct:0.10,procAuto:0.5};
const SEED_SIM={pret:500,costuri:50};
var S={tab:"sumar",reg:[],auto:[],set:{},sim:{},showF:false};
var KEY="cpfa3";
function load(){
  try{var d=JSON.parse(localStorage.getItem(KEY));if(d&&d.reg){S.reg=d.reg;S.auto=d.auto;S.set=d.set;S.sim=d.sim||SEED_SIM;return;}}catch(ex){}
  S.reg=JSON.parse(JSON.stringify(SEED_REG));S.auto=JSON.parse(JSON.stringify(SEED_AUTO));
  S.set=Object.assign({},SEED_SET);S.sim=Object.assign({},SEED_SIM);
}
function save(){try{localStorage.setItem(KEY,JSON.stringify({reg:S.reg,auto:S.auto,set:S.set,sim:S.sim}));}catch(ex){}}
function r2(n){return Math.round(((+n||0)+1e-9)*100)/100;}
function lei(n){return (+n||0).toLocaleString("ro-RO",{minimumFractionDigits:2,maximumFractionDigits:2})+" lei";}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function fd(s){if(!s)return"";var p=String(s).slice(0,10).split("-");return p.length===3?p[2]+"."+p[1]+"."+p[0]:s;}
function today(){return new Date().toISOString().slice(0,10);}
function engine(){
  var set=S.set;
  var p1=set.salariuMinim*6,p2=set.salariuMinim*12,p3=set.salariuMinim*24;
  var sold=0;
  var rc=S.reg.map(function(t){
    var inc=(+t.in_num||0)+(+t.in_banca||0);var pl=(+t.pl_num||0)+(+t.pl_banca||0);
    sold=r2(sold+inc-pl);return Object.assign({},t,{inc:inc,pl:pl,sold:sold});
  });
  var ven=rc.filter(function(t){return t.inc>0;}).map(function(t){
    return{data:t.data,doc:t.doc,descriere:t.fel,suma:r2(t.inc),metoda:(+t.in_banca||0)>0?"Bancă":"Numerar"};
  });
  var chReg=rc.filter(function(t){return t.pl>0;}).map(function(t){
    return{data:t.data,furnizor:t.fel,tip:(+t.pl_banca||0)>0?"Bancă":"Numerar",suma:r2(t.pl),doc:t.doc,sursa:"Registru"};
  });
  var chAuto=S.auto.map(function(a){
    var proc=(a.proc===""||a.proc==null)?set.procAuto:(+a.proc);
    return{data:a.data,furnizor:a.furnizor,tip:a.tip,desc:a.desc,full:r2(+a.suma||0),suma:r2((+a.suma||0)*proc),proc:proc,doc:a.doc,sursa:"Auto "+Math.round(proc*100)+"%"};
  });
  var venTotal=r2(ven.reduce(function(s,v){return s+v.suma;},0));
  var chRegTotal=r2(chReg.reduce(function(s,c){return s+c.suma;},0));
  var chAutoFull=r2(chAuto.reduce(function(s,c){return s+c.full;},0));
  var chAutoDed=r2(chAuto.reduce(function(s,c){return s+c.suma;},0));
  var cheltDed=r2(chRegTotal+chAutoDed);
  var venitNet=r2(venTotal-cheltDed);
  var CAS=0,CASS;
  if(venitNet<=p1)CASS=0;else if(venitNet<=p2)CASS=r2(p1*set.cassPct);else if(venitNet<=p3)CASS=r2(p2*set.cassPct);else CASS=r2(p3*set.cassPct);
  var impozit=r2(Math.max(0,(venitNet-CAS-CASS)*set.impozitPct));
  var net=r2(venitNet-CAS-CASS-impozit);
  var venBanca=r2(S.reg.reduce(function(s,t){return s+(+t.in_banca||0);},0));
  var plBancaReg=r2(S.reg.reduce(function(s,t){return s+(+t.pl_banca||0);},0));
  var chAutoDedBanca=r2(chAuto.filter(function(a){return a.tip==="Bancă";}).reduce(function(s,a){return s+a.suma;},0));
  var soldBanca=r2(venBanca-plBancaReg-chAutoDedBanca);
  var plNumReg=r2(S.reg.reduce(function(s,t){return s+(+t.pl_num||0);},0));
  var soldNum=r2(0-plNumReg);
  var alerta,atip;
  if(venitNet<=p1){alerta="OK: sub prag CASS";atip="ok";}else if(venitNet<=p2){alerta="Atenție: CASS nivel 1";atip="ww";}else if(venitNet<=p3){alerta="Atenție: CASS nivel 2";atip="ww";}else{alerta="Atenție: CASS nivel 3";atip="ww";}
  return{rc:rc,ven:ven,chReg:chReg,chAuto:chAuto,p1:p1,p2:p2,p3:p3,venTotal:venTotal,chRegTotal:chRegTotal,chAutoFull:chAutoFull,chAutoDed:chAutoDed,cheltDed:cheltDed,venitNet:venitNet,CAS:CAS,CASS:CASS,impozit:impozit,net:net,alerta:alerta,atip:atip,soldBanca:soldBanca,soldNum:soldNum,venBanca:venBanca,plBancaReg:plBancaReg,chAutoDedBanca:chAutoDedBanca};
}
var TABS=[
  {id:"sumar",lb:"Sumar",ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>'},
  {id:"registru",lb:"Registru",ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>'},
  {id:"auto",lb:"Auto",ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'},
  {id:"taxe",lb:"Taxe",ic:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>'},
  {id:"altele",lb:"Altele",ic:'<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>'},
];
function go(id){S.tab=id;render();}
function renderNav(){
  document.getElementById("bnav").innerHTML=TABS.map(function(t){
    return '<button class="bnt'+(S.tab===t.id?" on":"")+'" onclick="go(\''+t.id+'\')">'
      +t.ic+'<span>'+t.lb+'</span></button>';
  }).join("");
}
function render(){
  renderNav();var e=engine();var V=document.getElementById("view");
  if(S.tab==="sumar")V.innerHTML=vSumar(e);
  else if(S.tab==="registru")V.innerHTML=vReg(e);
  else if(S.tab==="auto")V.innerHTML=vAuto(e);
  else if(S.tab==="taxe")V.innerHTML=vTaxe(e);
  else if(S.tab==="altele")V.innerHTML=vAltele(e);
  else if(S.tab==="venituri")V.innerHTML=vVen(e);
  else if(S.tab==="cheltuieli")V.innerHTML=vChelt(e);
  else if(S.tab==="sim")V.innerHTML=vSim(e);
  else if(S.tab==="setari")V.innerHTML=vSetari(e);
  V.scrollTop=0;
}
function vSumar(e){
  return '<div class="sold-card"><div class="sold-label">Sold bancă real</div>'
    +'<div class="sold-val tnum disp">'+lei(e.soldBanca)+'</div>'
    +'<div class="sold-detail">'
    +'<div class="sdr"><span>Venituri bancă</span><b class="tnum">+'+lei(e.venBanca)+'</b></div>'
    +'<div class="sdr"><span>Plăți bancă Registru</span><b class="tnum">−'+lei(e.plBancaReg)+'</b></div>'
    +'<div class="sdr"><span>Auto deductibil bancă</span><b class="tnum">−'+lei(e.chAutoDedBanca)+'</b></div>'
    +'<div class="sdr-div"></div>'
    +'<div class="sdr"><span>Sold numerar</span><b class="tnum">'+(e.soldNum>=0?"+":"")+lei(e.soldNum)+'</b></div>'
    +'<div class="sdr"><span style="color:rgba(255,255,255,.8)">Sold total = profit fiscal</span><b class="tnum" style="color:rgba(255,255,255,.8)">'+lei(r2(e.soldBanca+e.soldNum))+'</b></div>'
    +'</div></div>'
    +'<div class="g2">'
    +'<div class="card stat"><div class="lb">Venituri totale</div><div class="vl tnum" style="font-size:20px;color:var(--green)">'+lei(e.venTotal)+'</div></div>'
    +'<div class="card stat"><div class="lb">Cheltuieli ded.</div><div class="vl tnum" style="font-size:20px;color:var(--red)">'+lei(e.cheltDed)+'</div></div>'
    +'<div class="card stat"><div class="lb">Profit fiscal</div><div class="vl tnum" style="font-size:20px;color:var(--navy)">'+lei(e.venitNet)+'</div></div>'
    +'<div class="card stat"><div class="lb">NET după taxe</div><div class="vl tnum" style="font-size:20px;color:var(--gold)">'+lei(e.net)+'</div></div>'
    +'</div>'
    +'<div class="card sp" style="padding:14px 15px"><div class="lb" style="margin-bottom:8px">Compoziție cheltuieli</div>'
    +[["Registru (plăți)",e.chRegTotal,false],["Auto deductibil ("+Math.round(S.set.procAuto*100)+"%)",e.chAutoDed,false],["Total deductibil",e.cheltDed,true]].map(function(r){
      return '<div style="display:flex;justify-content:space-between;padding:5px 0;'+(r[2]?"border-top:1px solid var(--line);margin-top:4px;font-weight:700":"")+'"><span style="font-size:13px">'+r[0]+'</span><span class="tnum" style="font-size:13px;color:'+(r[2]?"var(--red)":"var(--ink)")+'">'+lei(r[1])+'</span></div>';
    }).join("")+'</div>'
    +'<div class="alert '+e.atip+' sp">'+(e.atip==="ok"?"✓":"⚠")+' '+e.alerta+'</div>';
}
function ico(){return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';}
function add(){return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';}
function vReg(e){
  return '<div class="sechead"><div><div class="sectit">Registru 2026</div><div class="secsub">'+e.rc.length+' tranzacții · '+lei(e.venTotal)+' venituri</div></div>'
    +'<button class="addbtn" onclick="openReg()">'+add()+' Adaugă</button></div>'
    +e.rc.map(function(t){return '<div class="item"><div class="itxt" onclick="openReg('+t.id+')">'
      +'<span class="itag tnum">'+fd(t.data)+'</span><div class="ittl">'+esc(t.fel)+'</div>'
      +'<div class="imta tnum">'+(t.inc>0?'<span style="color:var(--green);font-weight:600">+'+lei(t.inc)+'</span>':"")
      +(t.pl>0?'<span style="color:var(--red);font-weight:600">−'+lei(t.pl)+'</span>':"")
      +'<span style="color:var(--grey)">sold '+lei(t.sold)+'</span></div>'
      +'</div><button class="idel" onclick="delReg('+t.id+')">'+ico()+'</button></div>';}).join("");
}
function vAuto(e){
  return '<div class="sechead"><div><div class="sectit">Auto</div><div class="secsub">Real '+lei(e.chAutoFull)+' · Ded. '+lei(e.chAutoDed)+'</div></div>'
    +'<button class="addbtn" onclick="openAuto()">'+add()+' Adaugă</button></div>'
    +e.chAuto.map(function(a,i){var id=S.auto[i].id;return '<div class="item"><div class="itxt" onclick="openAuto('+id+')">'
      +'<span class="itag tnum">'+fd(a.data)+'</span><div class="ittl">'+esc(a.furnizor)+' · '+esc(a.desc)+'</div>'
      +'<div class="imta tnum"><span style="color:var(--grey)">total '+lei(a.full)+'</span>'
      +'<span style="color:var(--red);font-weight:600">ded. '+lei(a.suma)+' ('+Math.round(a.proc*100)+'%)</span></div>'
      +'</div><button class="idel" onclick="delAuto('+id+')">'+ico()+'</button></div>';}).join("");
}
function vVen(e){
  return '<div class="sechead"><div><div class="sectit">Venituri</div><div class="secsub">Total '+lei(e.venTotal)+'</div></div></div>'
    +'<div class="card tbl-wrap"><table><thead><tr><th>Data</th><th>Descriere</th><th class="r">Sumă</th></tr></thead>'
    +'<tbody>'+e.ven.map(function(v){return '<tr><td>'+fd(v.data)+'</td><td style="white-space:normal;font-size:12px">'+esc(v.descriere)+'</td><td class="r tnum" style="color:var(--green);font-weight:700">'+lei(v.suma)+'</td></tr>';}).join("")+'</tbody>'
    +'<tfoot><tr><td colspan="2" style="color:var(--navy);font-weight:700">TOTAL</td><td class="r tnum" style="color:var(--green)">'+lei(e.venTotal)+'</td></tr></tfoot></table></div>';
}
function vChelt(e){
  var rows=e.chReg.map(function(c){return[fd(c.data),esc(c.furnizor),c.sursa,lei(c.suma)];}).concat(e.chAuto.map(function(c){return[fd(c.data),esc(c.furnizor),c.sursa,lei(c.suma)];}));
  return '<div class="sechead"><div><div class="sectit">Cheltuieli</div><div class="secsub">Total '+lei(e.cheltDed)+'</div></div></div>'
    +'<div class="card tbl-wrap"><table><thead><tr><th>Data</th><th>Furnizor</th><th>Sursă</th><th class="r">Lei</th></tr></thead>'
    +'<tbody>'+rows.map(function(r){return '<tr>'+r.map(function(c,j){return '<td class="'+(j===3?"r tnum":"")+'" style="'+(j===3?"color:var(--red);font-weight:700":"font-size:12px")+'">'+c+'</td>';}).join("")+'</tr>';}).join("")+'</tbody>'
    +'<tfoot><tr><td colspan="3" style="color:var(--navy);font-weight:700">TOTAL</td><td class="r tnum" style="color:var(--red)">'+lei(e.cheltDed)+'</td></tr></tfoot></table></div>';
}
function vTaxe(e){
  var rows=[["Venituri totale",e.venTotal,0,"var(--green)"],["Cheltuieli deductibile",e.cheltDed,0,"var(--red)"],
    ["Profit (venit net)",e.venitNet,1,"var(--navy)"],["CAS",e.CAS,0,"var(--ink)"],
    ["CASS",e.CASS,0,"var(--ink)"],["Impozit 10%",e.impozit,0,"var(--ink)"],["NET după taxe",e.net,1,"var(--gold)"]];
  return '<div class="sechead"><div><div class="sectit">Taxe</div><div class="secsub">Identic foaia Calculator</div></div></div>'
    +'<div class="card">'+rows.map(function(r){return '<div class="row" style="'+(r[2]?"background:var(--cream)":"")+'"><span style="font-size:'+(r[2]?15:14)+'px;font-weight:'+(r[2]?700:500)+'">'+r[0]+'</span>'
      +'<span class="tnum disp" style="font-size:'+(r[2]?18:15)+'px;font-weight:700;color:'+r[3]+'">'+lei(r[1])+'</span></div>';}).join("")+'</div>'
    +'<div class="alert '+e.atip+' sp">'+(e.atip==="ok"?"✓":"⚠")+' '+e.alerta+'</div>'
    +'<div class="card sp" style="padding:14px 15px"><div class="lb" style="margin-bottom:8px">Praguri CASS</div>'
    +'<div class="g3">'+[["6×",e.p1],["12×",e.p2],["24×",e.p3]].map(function(x){return '<div style="text-align:center"><div style="font-size:10px;color:var(--gold);font-weight:600">'+x[0]+'</div><div class="tnum" style="font-size:13px;font-weight:700;color:var(--navy)">'+lei(x[1])+'</div></div>';}).join("")+'</div></div>';
}
function vSim(e){
  var pr=+S.sim.pret||0,co=+S.sim.costuri||0,profit=r2(pr-co),cass=profit<=e.p1?0:r2(e.p1*S.set.cassPct),imp=r2((profit-cass)*0.1),net=r2(profit-cass-imp);
  return '<div class="sechead"><div><div class="sectit">Simulare curs</div><div class="secsub">Cât rămâne net</div></div></div>'
    +'<div class="g2in" style="margin-bottom:12px">'
    +'<div class="card stat"><label><div class="lb">Preț curs (lei)</div><input class="inp tnum" type="number" inputmode="decimal" value="'+pr+'" oninput="S.sim.pret=+this.value;save();render()"></label></div>'
    +'<div class="card stat"><label><div class="lb">Costuri (lei)</div><input class="inp tnum" type="number" inputmode="decimal" value="'+co+'" oninput="S.sim.costuri=+this.value;save();render()"></label></div></div>'
    +'<div class="card">'+[["Profit brut",profit,0],["CASS estimat",cass,0],["Impozit (10%)",imp,0],["NET",net,1]].map(function(r){return '<div class="row" style="'+(r[2]?"background:var(--cream)":"")+'"><span style="font-size:14px;font-weight:'+(r[2]?700:500)+'">'+r[0]+'</span><span class="tnum disp" style="font-size:'+(r[2]?20:15)+'px;font-weight:700;color:'+(r[2]?"var(--green)":"var(--ink)")+'">'+lei(r[1])+'</span></div>';}).join("")+'</div>';
}
function vSetari(e){
  var s=S.set;
  return '<div class="sechead"><div><div class="sectit">Setări</div></div></div>'
    +'<div class="card" style="padding:16px;display:flex;flex-direction:column;gap:14px;margin-bottom:12px">'
    +'<label><div class="lb">Salariu minim lunar (lei)</div><input class="inp tnum" type="number" inputmode="decimal" value="'+s.salariuMinim+'" oninput="S.set.salariuMinim=+this.value;save();render()"></label>'
    +'<div><div class="lb" style="margin-bottom:6px">Ești pensionar?</div><div class="seg">'
    +'<button class="'+(s.pensionar===1?"on":"")+'" onclick="S.set.pensionar=1;save();render()">DA</button>'
    +'<button class="'+(s.pensionar===0?"on":"")+'" onclick="S.set.pensionar=0;save();render()">NU</button></div></div>'
    +'<div class="g2in"><label><div class="lb">Impozit (%)</div><input class="inp tnum" type="number" inputmode="decimal" step="0.01" value="'+s.impozitPct+'" oninput="S.set.impozitPct=+this.value;save();render()"></label>'
    +'<label><div class="lb">CASS (%)</div><input class="inp tnum" type="number" inputmode="decimal" step="0.01" value="'+s.cassPct+'" oninput="S.set.cassPct=+this.value;save();render()"></label></div>'
    +'<label><div class="lb">Procent deductibil auto</div><input class="inp tnum" type="number" inputmode="decimal" step="0.05" value="'+s.procAuto+'" oninput="S.set.procAuto=+this.value;save();render()"></label>'
    +'</div>'
    +'<button onclick="resetAll()" style="width:100%;padding:13px;border-radius:13px;background:#fff;border:1px solid var(--line);color:var(--red);font-weight:700;font-size:14px">Resetează la datele inițiale</button>';
}
function vAltele(e){
  var opts=[
    {id:"venituri",lb:"Venituri",sub:"Generate automat · "+lei(e.venTotal),col:"#1a7a4a",ic:"📥"},
    {id:"cheltuieli",lb:"Cheltuieli deductibile",sub:"Registru + Auto · "+lei(e.cheltDed),col:"#C0392B",ic:"📤"},
    {id:"sim",lb:"Simulare Curs BLS-AED",sub:"Calcul net dintr-un curs",col:"#B08D57",ic:"✦"},
    {id:"setari",lb:"Setări & parametri",sub:"Salariu minim, taxe, procent auto",col:"#1A3A5C",ic:"⚙"},
  ];
  return '<div class="sechead"><div><div class="sectit">Altele</div></div></div>'
    +opts.map(function(o){return '<div class="menuitem" onclick="go(\''+o.id+'\')">'
      +'<div class="mico" style="background:'+o.col+'18;color:'+o.col+'">'+o.ic+'</div>'
      +'<div class="minfo"><div class="mt2">'+o.lb+'</div><div class="ms">'+o.sub+'</div></div>'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'
      +'</div>';}).join("");
}
function cm(){document.getElementById("modal").innerHTML="";}
function fld(l,i){return '<label class="fld"><div class="l">'+l+'</div>'+i+'</label>';}
function openReg(id){
  var r=id?Object.assign({},S.reg.find(function(x){return x.id===id;})):{data:today(),doc:"",fel:"",in_num:0,in_banca:0,pl_num:0,pl_banca:0};
  document.getElementById("modal").innerHTML='<div class="movl" onclick="if(event.target===this)cm()"><div class="msheet">'
    +'<div class="mhead"><span class="mt">'+(id?"Editează":"Adaugă")+' tranzacție</span><button style="color:#fff;font-size:20px;padding:4px" onclick="cm()">✕</button></div>'
    +'<div class="mbody">'
    +fld("Data",'<input id="rd" class="inp" type="date" value="'+((r.data||"").slice(0,10))+'">')
    +fld("Document",'<input id="rdc" class="inp" value="'+esc(r.doc)+'" placeholder="FF/..., BF/..., Extras">')
    +fld("Felul operațiunii",'<input id="rf" class="inp" value="'+esc(r.fel)+'" placeholder="Încasare factură / Achiziție...">')
    +'<div class="scl" style="color:var(--green)">ÎNCASĂRI</div>'
    +'<div class="g2in">'+fld("Numerar (lei)",'<input id="rin" class="inp tnum" type="number" inputmode="decimal" value="'+r.in_num+'">')
    +fld("Bancă (lei)",'<input id="rib" class="inp tnum" type="number" inputmode="decimal" value="'+r.in_banca+'">')+'</div>'
    +'<div class="scl" style="color:var(--red)">PLĂȚI</div>'
    +'<div class="g2in">'+fld("Numerar (lei)",'<input id="rpn" class="inp tnum" type="number" inputmode="decimal" value="'+r.pl_num+'">')
    +fld("Bancă (lei)",'<input id="rpb" class="inp tnum" type="number" inputmode="decimal" value="'+r.pl_banca+'">')+'</div>'
    +'<button class="sv" onclick="saveReg('+(id||0)+')">Salvează</button></div></div></div>';
}
function saveReg(id){
  var g=function(x){return document.getElementById(x).value;};
  var row={data:g("rd"),doc:g("rdc"),fel:g("rf"),in_num:+g("rin")||0,in_banca:+g("rib")||0,pl_num:+g("rpn")||0,pl_banca:+g("rpb")||0};
  if(id)S.reg=S.reg.map(function(x){return x.id===id?Object.assign({},row,{id:id}):x;});
  else S.reg.push(Object.assign({},row,{id:Date.now()}));
  save();cm();render();
}
function delReg(id){if(confirm("Ștergi această tranzacție?")){S.reg=S.reg.filter(function(x){return x.id!==id;});save();render();}}
function openAuto(id){
  var a=id?Object.assign({},S.auto.find(function(x){return x.id===id;})):{data:today(),furnizor:"",tip:"Bancă",desc:"",suma:0,proc:"",doc:""};
  document.getElementById("modal").innerHTML='<div class="movl" onclick="if(event.target===this)cm()"><div class="msheet">'
    +'<div class="mhead"><span class="mt">'+(id?"Editează":"Adaugă")+' cheltuială auto</span><button style="color:#fff;font-size:20px;padding:4px" onclick="cm()">✕</button></div>'
    +'<div class="mbody">'
    +fld("Data",'<input id="ad" class="inp" type="date" value="'+((a.data||"").slice(0,10))+'">')
    +fld("Furnizor",'<input id="af" class="inp" value="'+esc(a.furnizor)+'">')
    +fld("Descriere",'<input id="ads" class="inp" value="'+esc(a.desc)+'">')
    +'<div class="g2in">'+fld("Tip",'<select id="at" class="inp"><option'+(a.tip==="Bancă"?" selected":"")+'>Bancă</option><option'+(a.tip==="Numerar"?" selected":"")+'>Numerar</option></select>')
    +fld("Sumă totală (lei)",'<input id="as" class="inp tnum" type="number" inputmode="decimal" value="'+a.suma+'">')+'</div>'
    +fld("Procent ded. (gol = "+Math.round(S.set.procAuto*100)+"%)",'<input id="ap" class="inp tnum" type="number" inputmode="decimal" step="0.05" value="'+a.proc+'" placeholder="0.5">')
    +'<button class="sv" onclick="saveAuto('+(id||0)+')">Salvează</button></div></div></div>';
}
function saveAuto(id){
  var g=function(x){return document.getElementById(x).value;};
  var pv=g("ap");
  var row={data:g("ad"),furnizor:g("af"),tip:g("at"),desc:g("ads"),suma:+g("as")||0,proc:pv===""?"":+pv,doc:""};
  if(id)S.auto=S.auto.map(function(x){return x.id===id?Object.assign({},row,{id:id}):x;});
  else S.auto.push(Object.assign({},row,{id:Date.now()}));
  save();cm();render();
}
function delAuto(id){if(confirm("Ștergi?")){S.auto=S.auto.filter(function(x){return x.id!==id;});save();render();}}
function resetAll(){if(confirm("Revii la datele inițiale?")){S.reg=JSON.parse(JSON.stringify(SEED_REG));S.auto=JSON.parse(JSON.stringify(SEED_AUTO));S.set=Object.assign({},SEED_SET);S.sim=Object.assign({},SEED_SIM);save();render();}}
function exportCSV(){
  var e=engine();var q=function(s){return'"'+String(s==null?"":s).replace(/"/g,'""')+'"';};
  var c="\uFEFF";
  c+="REGISTRU 2026\nData,Document,Felul,Inc_Num,Inc_Banca,Pl_Num,Pl_Banca,Sold\n";
  e.rc.forEach(function(t){c+=[q(t.data),q(t.doc),q(t.fel),t.in_num,t.in_banca,t.pl_num,t.pl_banca,t.sold].join(",")+"\n";});
  c+="\nSUMAR\nIndicator,Valoare\n";
  [["Sold banca real",e.soldBanca],["Venituri",e.venTotal],["Cheltuieli deductibile",e.cheltDed],["Profit fiscal",e.venitNet],["CASS",e.CASS],["Impozit",e.impozit],["NET",e.net]]
  .forEach(function(r){c+=q(r[0])+","+r[1]+"\n";});
  var b=new Blob([c],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="ContaPFA_export.csv";a.click();
}
load();render();
</script>
</body>
</html>
